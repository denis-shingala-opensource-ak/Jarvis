<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        jarvis: {
                            dark: '#0a0e17',
                            darker: '#060912',
                            accent: '#00d4ff',
                            accent2: '#7c3aed',
                            surface: '#111827',
                            surface2: '#1f2937',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-jarvis-dark text-gray-100 dark">
    <div class="min-h-full flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-jarvis-accent to-jarvis-accent2 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-jarvis-accent to-jarvis-accent2 bg-clip-text text-transparent">JARVIS</h1>
                <p class="text-sm text-gray-500 mt-1">Create your account</p>
            </div>

            <!-- Register Form -->
            <div class="bg-jarvis-surface border border-gray-700 rounded-2xl p-8">

                <!-- Error Message -->
                <div id="error-msg" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>

                <!-- Success Message -->
                <div id="success-msg" class="hidden mb-4 p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-400 text-sm"></div>

                <form id="register-form" class="space-y-5">
                    <!-- Full Name -->
                    <div>
                        <label for="full-name" class="text-sm text-gray-400 block mb-1.5">Full Name</label>
                        <input
                            type="text"
                            id="full-name"
                            name="full_name"
                            required
                            placeholder="John Doe"
                            class="w-full bg-jarvis-dark border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-jarvis-accent transition-colors placeholder-gray-600"
                        >
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="text-sm text-gray-400 block mb-1.5">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            placeholder="you@example.com"
                            class="w-full bg-jarvis-dark border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-jarvis-accent transition-colors placeholder-gray-600"
                        >
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="text-sm text-gray-400 block mb-1.5">Password</label>
                        <div class="relative">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                                minlength="8"
                                placeholder="Min. 8 characters"
                                class="w-full bg-jarvis-dark border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-jarvis-accent transition-colors placeholder-gray-600 pr-10"
                            >
                            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                        <!-- Password Strength -->
                        <div id="password-strength" class="mt-2 hidden">
                            <div class="flex gap-1">
                                <div class="h-1 flex-1 rounded-full bg-gray-700" id="str-1"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-700" id="str-2"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-700" id="str-3"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-700" id="str-4"></div>
                            </div>
                            <p id="strength-text" class="text-xs text-gray-500 mt-1"></p>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label for="confirm-password" class="text-sm text-gray-400 block mb-1.5">Confirm Password</label>
                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm_password"
                            required
                            placeholder="Repeat your password"
                            class="w-full bg-jarvis-dark border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-jarvis-accent transition-colors placeholder-gray-600"
                        >
                        <p id="password-match" class="text-xs mt-1 hidden"></p>
                    </div>

                    <!-- Submit -->
                    <button
                        type="submit"
                        id="register-btn"
                        class="w-full py-3 rounded-xl bg-gradient-to-r from-jarvis-accent to-jarvis-accent2 text-white font-medium hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
                    >
                        <span>Create Account</span>
                        <svg id="register-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-6">
                    <div class="flex-1 h-px bg-gray-700"></div>
                    <span class="text-xs text-gray-500">OR</span>
                    <div class="flex-1 h-px bg-gray-700"></div>
                </div>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-400">
                    Already have an account?
                    <a href="/login" class="text-jarvis-accent hover:text-cyan-400 transition-colors font-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
