<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Register</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/jarvis-logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        jarvis: {
                            dark: '#0f1623',
                            darker: '#0a0f1a',
                            accent: '#00d4ff',
                            accent2: '#7c3aed',
                            surface: '#1a2233',
                            surface2: '#243044',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .auth-container { position: relative; z-index: 1; }
        .glass-card {
            background: rgba(26, 34, 51, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .logo-glow {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3), 0 0 60px rgba(124, 58, 237, 0.15);
        }

        /* Floating label input group */
        .form-group {
            position: relative;
        }
        .form-group .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            transition: color 0.3s;
            pointer-events: none;
            z-index: 2;
        }
        .form-group input:focus ~ .field-icon,
        .form-group input:not(:placeholder-shown) ~ .field-icon {
            color: #00d4ff;
        }
        .form-group .floating-label {
            position: absolute;
            left: 44px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.875rem;
            color: #6b7280;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }
        .form-group input:focus ~ .floating-label,
        .form-group input:not(:placeholder-shown) ~ .floating-label {
            top: 6px;
            transform: translateY(0);
            font-size: 0.65rem;
            font-weight: 500;
            color: #00d4ff;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .form-group input {
            padding-top: 22px;
            padding-bottom: 8px;
        }

        /* Gradient border on focus */
        .input-wrapper {
            position: relative;
            border-radius: 14px;
            background: rgba(15, 22, 35, 0.5);
            transition: all 0.3s;
        }
        .input-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 1.5px;
            background: linear-gradient(135deg, transparent, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            transition: background 0.4s;
            pointer-events: none;
        }
        .input-wrapper:focus-within::before {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
        }
        .input-wrapper:focus-within {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1), 0 0 40px rgba(124, 58, 237, 0.05);
        }
        .input-wrapper input {
            background: transparent;
            border: 1.5px solid rgba(100, 116, 139, 0.25);
            border-radius: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-wrapper:focus-within input {
            border-color: transparent;
        }

        /* Button */
        .glow-btn {
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.25), 0 0 40px rgba(124, 58, 237, 0.15);
            transition: all 0.3s;
        }
        .glow-btn:hover {
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(124, 58, 237, 0.25);
            transform: translateY(-1px);
        }
        .glow-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="h-full bg-jarvis-dark text-gray-200 dark overflow-hidden font-sans">

    <!-- Three.js Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Auth Content -->
    <div class="auth-container min-h-full flex items-center justify-center px-4 py-8 overflow-y-auto">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-jarvis-accent to-jarvis-accent2 flex items-center justify-center mx-auto mb-4 logo-glow">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-jarvis-accent to-jarvis-accent2 bg-clip-text text-transparent">JARVIS</h1>
                <p class="text-sm text-gray-400 mt-1">Create your account</p>
            </div>

            <!-- Register Form -->
            <div class="glass-card border border-gray-600/30 rounded-2xl p-8">

                <!-- Error Message -->
                <div id="error-msg" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>

                <!-- Success Message -->
                <div id="success-msg" class="hidden mb-4 p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-400 text-sm"></div>

                <form id="register-form" class="space-y-4">
                    <!-- First Name -->
                    <div class="input-wrapper">
                        <div class="form-group">
                            <input
                                type="text"
                                id="first-name"
                                name="first_name"
                                required
                                placeholder=" "
                                class="w-full pl-11 pr-4 text-sm text-gray-200 focus:outline-none h-14"
                            >
                            <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span class="floating-label">First Name</span>
                        </div>
                    </div>
                    <!-- Middle Name -->
                    <div class="input-wrapper">
                        <div class="form-group">
                            <input
                                type="text"
                                id="middle-name"
                                name="middle_name"
                                required
                                placeholder=" "
                                class="w-full pl-11 pr-4 text-sm text-gray-200 focus:outline-none h-14"
                            >
                            <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span class="floating-label">Middle Name</span>
                        </div>
                    </div>
                    <!-- Last Name -->
                    <div class="input-wrapper">
                        <div class="form-group">
                            <input
                                type="text"
                                id="last-name"
                                name="last_name"
                                required
                                placeholder=" "
                                class="w-full pl-11 pr-4 text-sm text-gray-200 focus:outline-none h-14"
                            >
                            <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span class="floating-label">Last Name</span>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="input-wrapper">
                        <div class="form-group">
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                                placeholder=" "
                                class="w-full pl-11 pr-4 text-sm text-gray-200 focus:outline-none h-14"
                            >
                            <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <span class="floating-label">Email address</span>
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="input-wrapper">
                            <div class="form-group">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    required
                                    minlength="8"
                                    placeholder=" "
                                    class="w-full pl-11 pr-12 text-sm text-gray-200 focus:outline-none h-14"
                                >
                                <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                                <span class="floating-label">Password</span>
                                <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors z-10">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <!-- Password Strength -->
                        <div id="password-strength" class="mt-2 hidden px-1">
                            <div class="flex gap-1">
                                <div class="h-1 flex-1 rounded-full bg-gray-600/50 transition-colors duration-300" id="str-1"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-600/50 transition-colors duration-300" id="str-2"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-600/50 transition-colors duration-300" id="str-3"></div>
                                <div class="h-1 flex-1 rounded-full bg-gray-600/50 transition-colors duration-300" id="str-4"></div>
                            </div>
                            <p id="strength-text" class="text-xs text-gray-400 mt-1"></p>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <div class="input-wrapper">
                            <div class="form-group">
                                <input
                                    type="password"
                                    id="confirm-password"
                                    name="confirm_password"
                                    required
                                    placeholder=" "
                                    class="w-full pl-11 pr-4 text-sm text-gray-200 focus:outline-none h-14"
                                >
                                <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                </svg>
                                <span class="floating-label">Confirm Password</span>
                            </div>
                        </div>
                        <p id="password-match" class="text-xs mt-1.5 px-1 hidden"></p>
                    </div>

                    <!-- Submit -->
                    <button
                        type="submit"
                        id="register-btn"
                        class="glow-btn w-full py-3.5 rounded-xl bg-gradient-to-r from-jarvis-accent to-jarvis-accent2 text-white font-semibold hover:opacity-90 transition-all flex items-center justify-center gap-2 text-sm tracking-wide mt-2"
                    >
                        <span>Create Account</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                        <svg id="register-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-6">
                    <div class="flex-1 h-px bg-gradient-to-r from-transparent via-gray-600/40 to-transparent"></div>
                    <span class="text-xs text-gray-500 tracking-widest uppercase">or</span>
                    <div class="flex-1 h-px bg-gradient-to-r from-transparent via-gray-600/40 to-transparent"></div>
                </div>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-400">
                    Already have an account?
                    <a href="/login" class="text-jarvis-accent hover:text-cyan-300 transition-colors font-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/static/js/particles-bg.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
